<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product – Gadgetszzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div id="product"></div>
<h3 style="padding:20px">Suggested Products</h3>
<div id="suggested"></div>

<script src="products.js"></script>
<script>
const id=new URLSearchParams(location.search).get("id");
const p=products.find(x=>x.id===id);

document.getElementById("product").innerHTML=`
  <h1>${p.name}</h1>
  <p>${p.desc}</p>
  <a href="${p.link}" target="_blank">🛒 Buy on Amazon</a>
`;

products.filter(x=>x.id!==id).slice(0,3).forEach(s=>{
  document.getElementById("suggested").innerHTML+=`
    <div onclick="location.href='product.html?id=${s.id}'">${s.name}</div>`;
});
</script>

</body>
</html>
