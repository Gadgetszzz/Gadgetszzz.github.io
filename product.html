<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product – Gadgetszzz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="robots" content="index, follow">
  <meta name="description" id="metaDesc">

  <style>
    body{
      margin:0;
      font-family:system-ui, sans-serif;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:#fff;
    }

    header{
      text-align:center;
      padding:30px 15px;
    }

    a{color:inherit;text-decoration:none}

    .product-box{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    /* Image slider */
    .slider{
      display:flex;
      gap:12px;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
    }
    .slider img{
      width:280px;
      border-radius:18px;
      scroll-snap-align:center;
    }

    h1{margin:20px 0 10px}

    .buy-btn{
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-top:18px;
      padding:14px 22px;
      background:#ff9900;
      color:#000;
      font-weight:700;
      border-radius:40px;
    }
    .buy-btn:hover{opacity:.9}

    /* Suggested */
    .suggested{
      margin-top:50px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }
    .card{
      background:rgba(255,255,255,.12);
      border-radius:18px;
      padding:14px;
      cursor:pointer;
    }
    .card img{
      width:100%;
      border-radius:14px;
    }
    .card h3{
      font-size:1rem;
      margin:10px 0 0;
    }
  </style>
</head>

<body>

<header>
  <h2>Gadgetszzz</h2>
</header>

<div class="product-box" id="product"></div>

<div class="product-box suggested">
  <h2>Suggested Products</h2>
  <div class="grid" id="suggested"></div>
</div>

<!-- IMPORTANT -->
<script src="products.js"></script>

<script>
const id = new URLSearchParams(location.search).get("id");
const product = products.find(p => p.id === id);

if(product){
  document.title = product.name + " – Gadgetszzz";
  document.getElementById("metaDesc").content = product.desc;

  document.getElementById("product").innerHTML = `
    <div class="slider">
      ${product.images.map(i=>`<img src="${i}" alt="${product.name}">`).join("")}
    </div>
    <h1>${product.name}</h1>
    <p>${product.desc}</p>
    <a class="buy-btn" href="${product.link}" target="_blank">
      🛒 Buy on Amazon
    </a>
  `;

  products.filter(p=>p.id!==id).slice(0,4).forEach(p=>{
    document.getElementById("suggested").innerHTML+=`
      <div class="card" onclick="location.href='product.html?id=${p.id}'">
        <img src="${p.images[0]}" alt="${p.name}">
        <h3>${p.name}</h3>
      </div>
    `;
  });
}
</script>

</body>
</html>
