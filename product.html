<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title id="ptitle"></title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:system-ui;
 background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
 color:#fff;
}
.wrap{max-width:900px;margin:auto;padding:25px}
.card{
 background:rgba(255,255,255,.12);
 border-radius:22px;
 padding:20px;
}
.card img{width:100%;border-radius:18px}
.buy{
 display:block;
 margin-top:18px;
 padding:16px;
 background:linear-gradient(135deg,#ff9900,#ffcc33);
 color:#000;
 text-align:center;
 border-radius:18px;
 font-weight:bold;
 text-decoration:none;
}
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
 gap:14px;
 margin-top:20px;
}
.item{
 background:rgba(255,255,255,.12);
 padding:10px;
 border-radius:16px;
 cursor:pointer;
}
.item img{width:100%;border-radius:12px}
</style>
</head>

<body>

<div class="wrap">

<div class="card">
<img id="img">
<h1 id="name"></h1>
<p id="desc"></p>
<a id="buy" class="buy" target="_blank">Buy on Amazon</a>
</div>

<h3>🔥 You may also like</h3>
<div class="grid" id="suggested"></div>

</div>

<script>
const p=Object.fromEntries(new URLSearchParams(location.search));
img.src=p.img;
name.innerText=p.name;
desc.innerText=p.desc;
buy.href=p.link;
ptitle.innerText=p.name+' – Gadgetszzz';

const products=[
 {name:'Portable Ring Light',img:'ring1.png'},
 {name:'Sunset Projection Lamp',img:'lamp1.png'},
 {name:'Glow Phone Case',img:'glow1.png'}
];

suggested.innerHTML=products.map(x=>`
<div class="item" onclick="history.back()">
<img src="${x.img}" loading="lazy">
<p>${x.name}</p>
</div>`).join('');
</script>

</body>
</html>
