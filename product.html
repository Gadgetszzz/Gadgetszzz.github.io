<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;padding:20px;background:#0f2027;color:#fff;font-family:system-ui}
button{padding:14px 24px;border:none;border-radius:30px;background:#ff9900;font-weight:700}
.suggest{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
</style>
</head>
<body>

<div id="main"></div>
<h3>Suggested</h3>
<div class="suggest" id="suggest"></div>

<script src="products.js"></script>
<script src="app.js"></script>
<script>
const id=new URLSearchParams(location.search).get("id");
const p=products.find(x=>x.id===id);

const m=document.getElementById("main");
m.append(slider(p.images));
m.innerHTML+=`<h1>${p.name}</h1><p>${p.desc}</p>
<button onclick="window.open('${p.buy}','_blank','noopener')">🛒 Buy on Amazon</button>`;

structured(p);

const s=document.getElementById("suggest");
products.filter(x=>x.id!==id).forEach(x=>{
  const c=document.createElement("div");
  c.append(slider(x.images));
  c.innerHTML+=`<p>${x.name}</p>`;
  c.onclick=()=>location.href=`product.html?id=${x.id}`;
  s.append(c);
});
</script>
</body>
</html>
