<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;padding:20px;background:#0f2027;color:#fff;font-family:system-ui}
</style>
</head>
<body>

<div id="product"></div>
<h3>Suggested</h3>
<div id="suggested"></div>

<script src="products.js"></script>
<script src="app.js"></script>
<script>
const id=new URLSearchParams(location.search).get("id");
const p=products.find(x=>x.id===id);

const wrap=document.getElementById("product");
wrap.append(slider(p.images));
wrap.innerHTML+=`
  <h1>${p.name}</h1>
  <p>${p.desc}</p>
  <button onclick="window.open('${p.buy}','_blank')">🛒 Buy on Amazon</button>
`;

injectStructuredData(p);

const sug=document.getElementById("suggested");
products.filter(x=>x.id!==id).forEach(x=>{
  const c=document.createElement("div");
  c.append(slider(x.images));
  c.onclick=()=>location.href=`product.html?id=${x.id}`;
  sug.append(c);
});
</script>
</body>
</html>
