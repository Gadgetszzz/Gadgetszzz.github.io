<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product – Gadgetszzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index,follow">

<style>
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

.wrap{max-width:900px;margin:40px auto;padding:20px}

.slider{overflow:hidden;border-radius:20px}
.slides{display:flex;transition:.3s}
.slides img{width:100%;flex-shrink:0}

.buy{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(135deg,#ff9900,#ffcc33);
  color:#000;
  padding:14px 26px;
  border-radius:30px;
  font-weight:700;
  text-decoration:none;
  margin:20px 0;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:18px;
  margin-top:40px;
}

.product{
  background:rgba(255,255,255,.12);
  padding:12px;
  border-radius:18px;
  cursor:pointer;
}
.product img{width:100%;border-radius:14px}
</style>
</head>

<body>

<div class="wrap" id="content"></div>

<script src="products.js"></script>
<script>
const id=new URLSearchParams(location.search).get("id");
const p=products.find(x=>x.id===id);
if(!p) location.href="index.html";

document.title=p.name+" – Gadgetszzz";

document.getElementById("content").innerHTML=`
  <h1>${p.name}</h1>
  <div class="slider">
    <div class="slides">
      ${p.images.map(i=>`<img src="${i}">`).join("")}
    </div>
  </div>
  <p>${p.desc}</p>
  <a class="buy" href="${p.link}" target="_blank">🛒 Buy on Amazon</a>

  <h2>You may also like</h2>
  <div class="container" id="suggested"></div>
`;

products.filter(x=>x.id!==id).slice(0,4).forEach(s=>{
  document.getElementById("suggested").innerHTML+=`
    <div class="product" onclick="location.href='product.html?id=${s.id}'">
      <img src="${s.images[0]}">
      <h3>${s.name}</h3>
    </div>`;
});
</script>

</body>
</html>
