<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title id="seo-title">Product – gadgetdszzz</title>
<meta name="description" id="seo-desc" content="">
<meta name="robots" content="index, follow">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#061a33;
  color:#fff;
  padding:20px;
}
img{
  max-width:100%;
  border-radius:18px;
}
.buy{
  display:block;
  margin:20px 0;
  padding:16px;
  background:#ffcc33;
  color:#000;
  text-align:center;
  border-radius:16px;
  font-weight:700;
  text-decoration:none;
}
a{color:#ffcc33;text-decoration:none}
</style>
</head>

<body>

<main>
  <h1 id="name"></h1>
  <img id="image">
  <p id="desc"></p>

  <a id="buy" class="buy" target="_blank">Buy on Amazon</a>

  <h3>Suggested Products</h3>
  <div id="suggested"></div>
</main>

<script src="products.js"></script>
<script>
var id = new URLSearchParams(window.location.search).get("id");
var product = products.find(function(p){ return p.id === id });

if(!product){
  document.body.innerHTML = "<p>Product not found.</p>";
}

/* CONTENT */
document.getElementById("name").textContent = product.name;
document.getElementById("desc").textContent = product.desc;
document.getElementById("image").src = product.img;
document.getElementById("buy").href = product.link;

/* SEO */
document.getElementById("seo-title").textContent = product.name + " – gadgetdszzz";
document.getElementById("seo-desc").setAttribute("content", product.desc);

/* SUGGESTED */
products.filter(function(p){ return p.id !== id }).slice(0,3)
.forEach(function(p){
  document.getElementById("suggested").innerHTML +=
    `<p><a href="product.html?id=${p.id}">${p.name}</a></p>`;
});
</script>

</body>
</html>
