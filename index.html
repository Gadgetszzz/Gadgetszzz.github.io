<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gadgetszzz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    text-align: center;
  }

  header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
  }

  .card {
    background: #ffffff;
    color: #000;
    max-width: 900px;
    margin: 30px auto;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  .slider {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 15px;
  }

  .slider img {
    width: 300px;
    border-radius: 12px;
    scroll-snap-align: center;
    flex-shrink: 0;
  }

  .slider::-webkit-scrollbar {
    display: none;
  }

  .desc {
    margin: 20px 0;
    font-size: 16px;
  }

  .buy-btn {
    display: inline-block;
    background: linear-gradient(135deg, #ff9900, #ff6600);
    color: #000;
    padding: 14px 26px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .buy-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
  }

  footer {
    font-size: 12px;
    padding: 20px;
    opacity: 0.8;
  }
</style>
</head>

<body>

<header>🔥 Gadgetszzz Picks</header>

<div class="card">
  <h2>Rechargeable Milk Frother</h2>

  <div class="slider">
    <img src="frother1.png" alt="Milk Frother">
    <img src="frother2.png" alt="Milk Frother Accessories">
  </div>

  <p class="desc">
    Powerful rechargeable milk frother with 3 speed modes.
    Perfect for coffee, cappuccino, matcha, and eggs.
  </p>

  <a class="buy-btn"
     href="https://amzn.to/48qoJXj"
     target="_blank"
     rel="nofollow sponsored">
     🛒 Buy on Amazon
  </a>
</div>

<footer>
  As an Amazon Associate I earn from qualifying purchases.
</footer>

</body>
</html>
