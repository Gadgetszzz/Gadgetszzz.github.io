<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gadgetszzz – Viral Gadgets</title>
<meta name="description" content="Trending gadgets and accessories people actually buy.">
<meta name="viewport" content="width=device-width,initial-scale=1">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());
gtag('config','G-XXXXXXXXXX');
</script>

<style>
body{margin:0;background:#0f2027;color:#fff;font-family:system-ui}
header,footer{text-align:center;padding:25px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;padding:20px}
.card{background:rgba(255,255,255,.1);padding:15px;border-radius:20px;cursor:pointer}
.slider{overflow:hidden;border-radius:15px}
.track{display:flex;transition:.4s}
.track img{width:100%}
.dots{text-align:center}
.dot{width:8px;height:8px;background:#666;border-radius:50%;display:inline-block;margin:5px}
.dot.on{background:#fff}
.cart{
  width:100%;padding:12px;border:none;border-radius:30px;
  background:#ff9900;font-weight:700;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.05)}
  100%{transform:scale(1)}
}
a{color:#fff;margin:0 10px}
</style>
</head>
<body>

<header>
<h1>Gadgetszzz</h1>
<a href="about.html">About</a>
<a href="privacy.html">Privacy</a>
<a href="contact.html">Contact</a>
</header>

<div class="grid" id="grid"></div>

<footer>
<p>© Gadgetszzz | Amazon Associate</p>
</footer>

<script src="products.js"></script>
<script src="app.js"></script>
<script>
const g=document.getElementById("grid");
products.forEach(p=>{
  const c=document.createElement("div");
  c.className="card";
  c.append(slider(p.images));
  c.innerHTML+=`<h3>${p.name}</h3><p>${p.desc}</p><button class="cart">🛒 View</button>`;
  c.onclick=()=>location.href=`product.html?id=${p.id}`;
  g.append(c);
});
</script>
</body>
</html>
