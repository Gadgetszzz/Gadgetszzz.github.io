<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gadgetszzz</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Trending gadgets people actually buy">
<link rel="preload" as="image" href="images/frother1.jpg">
<style>
body{margin:0;background:#0f2027;color:#fff;font-family:system-ui}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;padding:20px}
.card{background:rgba(255,255,255,.1);padding:15px;border-radius:20px}
.slider{overflow:hidden;border-radius:15px}
.slides{display:flex;transition:.4s}
.slides img{width:100%}
.dots{text-align:center}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#777;margin:5px}
.dot.active{background:#fff}
button{width:100%;padding:12px;border-radius:30px;border:none;background:#ff9900;font-weight:bold}
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script src="products.js"></script>
<script src="app.js"></script>
<script>
const grid=document.getElementById("grid");

products.forEach(p=>{
  const c=document.createElement("div");
  c.className="card";
  c.append(slider(p.images));
  c.innerHTML+=`
    <h3>${p.name}</h3>
    <p>${p.desc}</p>
    <button>🛒 View</button>
  `;
  c.onclick=()=>location.href=`product.html?id=${p.id}`;
  grid.append(c);
});
</script>
</body>
</html>
