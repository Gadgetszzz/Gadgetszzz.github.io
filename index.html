<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gadgetszzz – Viral Gadgets & Accessories</title>
  <meta name="description" content="Discover trending viral gadgets, phone accessories, and smart tools. Hand-picked Amazon finds.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="VBDeynzSAlxpqKOt-M0SDvNMl0kTDdUtpQY1o3XnMD8">
  <link rel="canonical" href="https://gadgetszzz.github.io/">

<style>
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}
header{text-align:center;padding:50px 20px}
.hero h1{
  font-size:3rem;
  background:#fff;
  color:#000;
  display:inline-block;
  padding:14px 32px;
  border-radius:50px;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{50%{transform:translateY(-10px)}}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
  padding:30px;
}

.product{
  background:rgba(255,255,255,.12);
  border-radius:22px;
  padding:15px;
  cursor:pointer;
  transition:.3s;
}
.product:hover{transform:translateY(-6px)}
.product img{width:100%;border-radius:16px}
.product h3{margin:10px 0 5px}
.product p{opacity:.85;font-size:14px}

footer{
  text-align:center;
  padding:25px;
  font-size:13px;
  opacity:.7;
}
footer a{color:#fff;text-decoration:none;margin:0 8px}
</style>
</head>

<body>

<header class="hero">
  <h1>Gadgetszzz</h1>
  <p>Trending gadgets people actually buy</p>
</header>

<div class="container" id="products"></div>

<footer>
  <a href="about.html">About</a> ·
  <a href="privacy.html">Privacy</a> ·
  <a href="contact.html">Contact</a>
  <p>© 2026 Gadgetszzz</p>
</footer>

<script src="products.js"></script>
<script>
const wrap=document.getElementById("products");
products.forEach(p=>{
  wrap.innerHTML+=`
    <div class="product" onclick="location.href='product.html?id=${p.id}'">
      <img src="${p.images[0]}" loading="lazy" alt="${p.name}">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
    </div>`;
});
</script>

</body>
</html>
