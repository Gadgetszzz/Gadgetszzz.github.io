<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background: linear-gradient(135deg, #000000 0%, #0a0a2e 100%); 
            color: white;
            min-height: 100vh;
            margin: 0;
        }
        
        h1 { color: #ffffff; }
        
        /* Button Style */
        .amazon-btn {
            background-color: #FFD814;
            border: none;
            padding: 15px 30px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: inline-block;
            margin-top: 20px;
            transition: background-color 0.2s;
        }
        
        .amazon-btn:hover { 
            background-color: #F7CA00; 
        }

        /* Cart Icon - Completely still */
        .cart-icon {
            display: inline-block;
            transform: scaleX(-1); /* Keep cart flipped */
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <h1>Welcome to Gadgetszzz</h1>
    <p>Discover our premium selection of tech.</p>

    <!-- Buy Button with static Cart -->
    <a href="YOUR_AMAZON_AFFILIATE_LINK_HERE" class="amazon-btn">
        <span class="cart-icon">🛒</span> Buy on Amazon
    </a>

</body>
</html>
