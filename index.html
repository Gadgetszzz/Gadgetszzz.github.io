<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>gadgetdszzz – Viral Gadgets & Phone Accessories</title>
<meta name="description" content="Discover viral gadgets, phone cases, and trending Amazon finds. Curated products that actually work.">
<meta name="robots" content="index, follow">

<!-- Open Graph -->
<meta property="og:title" content="gadgetdszzz – Viral Gadgets">
<meta property="og:description" content="Trending gadgets and accessories people actually buy.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://gadgetdszzz.github.io/">

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  background:#061a33;
  color:#fff;
}

/* HERO */
.hero{
  min-height:85vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.cloud{
  background:#fff;
  color:#061a33;
  padding:32px 48px;
  border-radius:120px;
  font-size:3rem;
  font-weight:800;
  box-shadow:0 20px 40px rgba(0,0,0,.35);
  animation:float 6s ease-in-out infinite;
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-16px)}
  100%{transform:translateY(0)}
}
.hero p{opacity:.85;margin-top:18px}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
  padding:40px 20px 70px;
}
.product{
  background:rgba(255,255,255,.08);
  padding:16px;
  border-radius:22px;
}
.product img{
  width:100%;
  border-radius:16px;
}
.product h2{margin:12px 0 6px;font-size:1.1rem}
.product p{font-size:14px;opacity:.85}

.buy{
  display:block;
  margin-top:12px;
  padding:14px;
  background:#ffcc33;
  color:#000;
  text-align:center;
  border-radius:16px;
  font-weight:700;
  text-decoration:none;
}

footer{
  text-align:center;
  padding:22px;
  font-size:13px;
  opacity:.75;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div>
    <div class="cloud">gadgetdszzz</div>
    <p>Viral gadgets people actually want</p>
  </div>
</section>

<!-- PRODUCTS -->
<main id="products" class="container"></main>

<footer>
  <p>As an Amazon Associate, I earn from qualifying purchases.</p>
  <p>© 2026 gadgetdszzz</p>
</footer>

<!-- LOAD PRODUCTS -->
<script src="products.js"></script>

<!-- RENDER PRODUCTS -->
<script>
var container = document.getElementById("products");

products.forEach(function(p){
  container.innerHTML += `
    <article class="product">
      <a href="product.html?id=${p.id}">
        <img src="${p.img}" alt="${p.name}">
      </a>
      <h2>${p.name}</h2>
      <p>${p.desc}</p>
      <a class="buy" href="${p.link}" target="_blank" rel="nofollow noopener">Buy on Amazon</a>
    </article>
  `;
});
</script>

</body>
</html>
