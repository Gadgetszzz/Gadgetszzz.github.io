<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gadgetszzz – Viral Gadgets & Accessories</title>

  <!-- SEO -->
  <meta name="description" content="Discover trending gadgets, phone accessories, and smart tools. Hand-picked viral products with Amazon affiliate links.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="VBDeynzSAlxpqKOt-M0SDvNMl0kTDdUtpQY1o3XnMD8">

  <style>
    body{
      margin:0;
      font-family:system-ui,sans-serif;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:#fff;
    }

    header{
      text-align:center;
      padding:40px 20px;
    }

    .hero h1{
      font-size:3rem;
      background:#fff;
      color:#000;
      display:inline-block;
      padding:14px 30px;
      border-radius:50px;
      animation:float 3s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:20px;
      padding:30px;
    }

    .product{
      background:rgba(255,255,255,.12);
      border-radius:20px;
      padding:15px;
    }

    .slider{
      overflow:hidden;
      border-radius:14px;
    }

    .slides{
      display:flex;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
    }

    .slides img{
      width:100%;
      flex-shrink:0;
      scroll-snap-align:center;
      border-radius:14px;
    }

    .buy{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:10px;
      background:#ff9900;
      color:#000;
      text-decoration:none;
      padding:12px;
      border-radius:12px;
      font-weight:700;
    }

    .buy:hover{background:#ffb733}
  </style>
</head>

<body>

<header class="hero">
  <h1>Gadgetszzz</h1>
  <p>Trending gadgets people actually buy</p>
</header>

<div class="container" id="products"></div>

<script src="products.js"></script>
<script>
const wrap = document.getElementById("products");

products.forEach(p=>{
  wrap.innerHTML += `
    <div class="product">
      <div class="slider" onclick="location.href='product.html?id=${p.id}'">
        <div class="slides">
          ${p.images.map(img=>`<img src="${img}" alt="${p.name}">`).join("")}
        </div>
      </div>
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <a class="buy" href="${p.link}" target="_blank">
        🛒 Buy on Amazon
      </a>
    </div>
  `;
});
</script>

</body>
</html>
