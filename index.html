<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gadgetszzz – Viral Gadgets That Actually Work</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  z-index:1000;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(12px);
  text-align:center;
  padding:18px;
}

/* HERO */
.hero{
  position:relative;
  overflow:hidden;
  text-align:center;
  padding:90px 20px;
}
.hero h2,.hero p{position:relative;z-index:2}
.bubbles{position:absolute;inset:0;z-index:0}
.bubble{
  position:absolute;
  bottom:-120px;
  background:rgba(255,255,255,.15);
  border-radius:50%;
  animation:float linear infinite;
}
@keyframes float{
  from{transform:translateY(0);opacity:1}
  to{transform:translateY(-120vh);opacity:0}
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
  padding:30px 20px 60px;
}
.product{
  background:rgba(255,255,255,.12);
  border-radius:22px;
  padding:15px;
  box-shadow:0 18px 45px rgba(0,0,0,.45);
  transition:.35s;
  cursor:pointer;
}
.product:hover{transform:translateY(-6px)}
.slider{overflow:hidden;border-radius:16px}
.slides{display:flex;transition:.35s}
.slides img{width:300px;flex-shrink:0}
.buy{
  display:block;
  margin-top:14px;
  padding:14px;
  background:linear-gradient(135deg,#ff9900,#ffcc33);
  color:#000;
  text-align:center;
  border-radius:16px;
  font-weight:bold;
  text-decoration:none;
}
.buy:hover{transform:scale(1.05)}
</style>
</head>

<body>

<header>
  <h1>Gadgetszzz</h1>
  <p>Trending gadgets you actually want</p>
</header>

<section class="hero">
  <div class="bubbles"></div>
  <h2>🔥 Viral Gadgets People Love</h2>
  <p>Tap a product to see details & similar picks</p>
</section>

<div class="container">

<!-- PRODUCT -->
<div class="container" id="products"></div>

<script>
/* bubbles */
const bubbles=document.querySelector('.bubbles');
for(let i=0;i<18;i++){
 const b=document.createElement('div');
 b.className='bubble';
 const s=Math.random()*80+20;
 b.style.width=b.style.height=s+'px';
 b.style.left=Math.random()*100+'%';
 b.style.animationDuration=10+Math.random()*20+'s';
 bubbles.appendChild(b);
}

/* product click */
function openProduct(p){
 location.href='product.html?'+new URLSearchParams(p).toString();
}
</script>

</body>
</html>
