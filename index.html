<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        
        /* Button Style */
        .amazon-btn {
            background-color: #FFD814;
            border: 1px solid #FCD200;
            padding: 15px 30px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            display: inline-block;
            margin-top: 20px;
            position: relative;
            overflow: hidden; /* Keeps the animation inside the button */
        }
        .amazon-btn:hover { background-color: #F7CA00; }

        /* Mirrored Cart Animation */
        .cart-container {
            display: inline-block;
            transform: scaleX(-1); /* Flips the cart to face left */
            margin-right: 10px;
            animation: moveCart 3s linear infinite;
        }

        .amazon-btn:hover .cart-container {
            animation-play-state: paused;
        }

        @keyframes moveCart {
            0% { transform: scaleX(-1) translateX(20px); }
            100% { transform: scaleX(-1) translateX(-20px); }
        }
    </style>
</head>
<body>

    <h1>Welcome to Gadgetszzz</h1>
    <p>Check out our latest featured product!</p>

    <!-- Buy Button with integrated Cart -->
    <a href="YOUR_AMAZON_AFFILIATE_LINK_HERE" class="amazon-btn">
        <span class="cart-container">🛒</span> Buy on Amazon
    </a>

</body>
</html>
