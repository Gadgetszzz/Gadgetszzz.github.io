<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gadgetszzz – Viral Gadgets</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Trending gadgets and accessories people actually buy.">
<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}
header{text-align:center;padding:40px}
h1{background:#fff;color:#000;padding:14px 30px;border-radius:50px;display:inline-block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;padding:30px}
.card{background:rgba(255,255,255,.12);border-radius:20px;padding:15px}
.slider{overflow:hidden;border-radius:16px}
.slides{display:flex;transition:.3s}
.slides img{width:100%;flex-shrink:0}
button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:30px;
  background:#ff9900;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>
<body>

<header>
  <h1>Gadgetszzz</h1>
  <p>Trending gadgets people actually buy</p>
</header>

<div class="grid" id="grid"></div>

<script src="products.js"></script>
<script>
const grid = document.getElementById("grid");

products.forEach(p=>{
  grid.innerHTML+=`
    <div class="card">
      <div class="slider" data-id="${p.id}">
        <div class="slides">
          ${p.images.map(i=>`<img src="${i}">`).join("")}
        </div>
      </div>
      <h3>${p.name}</h3>
      <p>${p.desc}</p>
      <button onclick="location.href='product.html?id=${p.id}'">View Product</button>
    </div>
  `;
});

initSwipers();
</script>

<script>
function initSwipers(){
  document.querySelectorAll(".slider").forEach(slider=>{
    const slides = slider.querySelector(".slides");
    let i=0,startX=0;

    slider.onmousedown=e=>startX=e.clientX;
    slider.onmouseup=e=>{
      let d=e.clientX-startX;
      if(d<-50 && i<slides.children.length-1)i++;
      if(d>50 && i>0)i--;
      slides.style.transform=`translateX(-${i*100}%)`;
    };

    slider.ontouchstart=e=>startX=e.touches[0].clientX;
    slider.ontouchend=e=>{
      let d=e.changedTouches[0].clientX-startX;
      if(d<-50 && i<slides.children.length-1)i++;
      if(d>50 && i>0)i--;
      slides.style.transform=`translateX(-${i*100}%)`;
    };
  });
}
</script>
</body>
</html>
